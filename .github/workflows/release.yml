name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    if: github.repository == 'oaslananka-lab/helix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oaslananka-lab/helix/gateway:${{ github.ref_name }}
            ghcr.io/oaslananka-lab/helix/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oaslananka-lab/helix/agent:${{ github.ref_name }}
            ghcr.io/oaslananka-lab/helix/agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Generate Gateway SBOM
        run: |
          pnpm --filter @helix/gateway exec cyclonedx-npm \
            --ignore-npm-errors \
            --output-format json \
            --output-file ../../sbom-gateway.json \
            2> cyclonedx-gateway.log || {
              cat cyclonedx-gateway.log
              exit 1
            }
          test -s sbom-gateway.json

      - name: Generate Agent SBOM
        run: |
          pnpm --filter @helix/agent exec cyclonedx-npm \
            --ignore-npm-errors \
            --output-format json \
            --output-file ../../sbom-agent.json \
            2> cyclonedx-agent.log || {
              cat cyclonedx-agent.log
              exit 1
            }
          test -s sbom-agent.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            sbom-gateway.json
            sbom-agent.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
